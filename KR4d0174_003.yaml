body:
  text: 灊山集卷三宋朱翌撰五言排律元宵懷都城簡胡令俊民時胡連夕在告天豁晴光合簷收雪汁乾燈期欣在候火令不為難方喜春風動猶憐暮色寒仙晨今夜樂帝所舊年觀郁郁卿雲密蔥蔥瑞氣盤五門雙闕聳三島十洲攢風伯清黃道鈎陳衛赤鸞聲流車水快花影燭龍蟠入望雲裳舉低迷雜珮珊歌翻樓上下人與月團欒夜色清凝露香風靜泛蘭陸蓮搖艷質湯鯉轉驚瀾故國雲天外家風楚俗完良時亦競作遊興頗相干諸縣豐登際元戎禮數寬輟耕來野父沽酒辦餘歡少問飛鳬客遙知道室安樵青能笑語太白酌瀰漫要是絃堂宓何妨花縣潘黃庭須默課燈録不重看羡子閉門坐嗟豫腳力殫醉歸哦五字一一待公刋南華五十韻鄉里黃梅接家居祖剎鄰常聞肉身佛甘作磑坊人堅有懸腰石空無拂鏡塵已舂諸米熟自識本心真拄杖敲頑質袈裟繞淨身衣傳千古信法待五年伸撥棹煩師送投林避衆嗔風幡俱不動金瓦定非倫汝聽宜皆諦吾言決可遵由兹開頓教為世作良因葉墜雖歸本煙斜不向新鈴聲鳴白塔霧氣走黃巾塑手藏衣襲閨姝敗鉢脣全提諸佛印開盡一花春代代燈燈續塵塵剎剎均性天南北合道德帝王親歌鼓昭陵日梯航外國珍莊嚴及山谷賜豫出金銀龍翥開飛帛春溫布縯綸鎮安清淨境奔走護持神樓閣三千界香燈十二辰蘇銘模妙墨栁記刻豐珉自昔炎荒地常容放逐臣流人悲去越從者病居陳庚子何憂鵩春秋謾感麟足生行路繭眉結念親顰卜吐千瓶水官分十束薪九韶先幸舜五嶺後通秦氣候今無瘴人情古亦惇何嘗疏北客賸喜預嘉賔鼓角催歸夢江湖動釣緡時花開有信山果種生仁武水長懷古曹溪每問津端居七里郭相望一由旬抱被來投宿聞鐘起及晨自憐終北向天遣試南詢竟日雲垂地通宵雨濺茵橋橫一滴上雀見五方馴飛錫泉香發連山寶氣振杖尋桃竹把佩采楚蘭紉大禮行郊次洪恩浹海濵稍寬三面網歸作再生民甫里將收栗松江細煮蓴橘懷工戲綵萱背更栽椿風急團雲絮霜清洗月輪治行今數日問信不嫌頻三宿真成戀諸寮且遍巡鬬茶誇顧渚羮芋説西岷寺有壇經舊誰知祖意諄持歸化嶺北大地免沉淪送吏部張尚書帥成都一百韻一代亨衢上明公逸步超河東書具作圯下老相邀海濶雲垂翼天清斗壓杓三人前鼎甲千佛仰孤飈弟子師尊董諸儒稱述蕭西崑收俊乂東壁絶塵囂别乘將離汴輕舟徑指苕湖山縱清美家國尚飄颻慟哭天傾柱歸情户見蛸奉祠投里閈招隱向山椒並海屯千衛披榛拱百僚回鑾須故國負靮且今朝光列哀烏位星馳封馬軺賢裾來接武陰沴自潛消香案依丹陛螭坳立紫霄飛鴻九天去歸鶴一聲嘹主上思圖舊王人促見招起居還左史議論鄙南朝大呂聲揚逺元圭質匪雕掖垣裁詔密禁路賜纓彯滅澆圖興夏巡方首從姚自南瞻析木直北望玄枵玉海千尋浪江南五色鷂矯如出塵隼凛若在秋雕去國還追信刓章豈易堯光華司馬甲整頓路車鞗國事煩參決廷詢得具條乘時笑乾沒許國敢輕佻河洛干戈滿陵原草木焦青春深仗節久雨更乘橇取道先轅楚揚旌轉望蕭一壞藏萬世九廟正三昭遂使儀如漢將令樂奏韶路迷彪過迹澗涸夜生潮去日春仍淺歸期暑正熇君王喜不寐天下首方翹疏奏忠無隱臣生苦不聊戴天那忍共得地豈宜驕內治今當亟髙名不敢要銓衡真有託啓事復何遼道直咸推汲謀深豈計朝定非揮扇羽寧要插蟬貂褒貶書方舉姦諛骨合銷懷開真坦坦燕處自夭夭當寧西南顧常懷參井迢遍詢醫國效立遣愈民痟文武資兼稟詩書氣不恌衆皆可卻縠一以委張昭除目凌晨下行裝即日撩被攜猶刺刺涉逺乃翛翛帆影三江水車聲萬里橋丈人峯嵂屼神女峽岧嶤石室畫暗淡草堂人寂寥山圍玉壘峻水減石犀遙石表筍雙立銅青柏未凋錦江喧士女藥市混仙樵劫墮乾坤壞流橫海嶽漂惟兹井絡外依舊角弓弨自昔三刀夢多傳五袴謡威餘嚴僕射功説李文饒文定棠尤美乖崖福可徼事今難悉數公亦豈其苗秦地新通棧瞿塘穩泛橈虎貔環外閫耨耜得深穮正可供壺奕隨宜列鼓簫蒲鞭束髙閣竹馬戲垂髫好閲相如賦終間李廣刁奎文天象轉延閣士林標此去庭無愈行聞衆選陶付之樞極運咸仰泰階霄賤子無三徑平生有一瓢老將書蠧稿時作草蟲喓大笑玉三刖不求銀十腰古今同閲宙南北信吹薸已類蜂粘網真成鹿覆蕉屢經多盜境幾至獨身跳何處地堪避知誰戰敢挑月明三匝鵲巢比一枝鷯釣瀨長烹鯉窮山飽聽梟臨書池盡黑就局博嫌么臂有七賢把丹亡九轉燒唯堪貫薜荔未肯摋芳虈賣藥難爭價為農等寓僑稍能羞野葛初未識江珧已罷尋蛩駏欣聞退猲獢誰憐人為米敢有意遷喬過我深披藋追涼薄曵綃狐裘憐晏子縞帶與公僑挽引煩推轂陶甄為置窑清時容潦倒策府著芻蕘憶昨西湖上隨公羽蓋飄青山迎晉履緑水泛湖􅊑上相尊仍美將軍勇正驍道爭棊屢覆壺響箭呈梟茶乳晴尤發香雲淨更翲晚花棲嫩菊近岸俯遊鰷四望天連水羣簮玉及瑶政親連榻坐倐見錫戈雕良月霜楓冷佳晴雪霰銷留公已無策鼎食望加調宣城書懷髙爽清涼郡登臨佳麗都上連三蜀重旁挾兩淮趨天分光牛斗溪行走舳艫新林天際浦青草栁邊湖丁令鶴歸晚琴髙鯉疾驅髙城布渠答近市表浮屠龍具深耕雨牛車富入租鐘魚廣教飯簫鼓敬亭巫禱請俱先詣齋修必盡愚虔恭問杯珓疇昔夢摴蒱桃李萬家邑魚鹽百賈區棊爭三品勝錢為七郎輸湖上同皇甫樓中記獨孤五雲裘可作天馬錦應無射的穿雲白蓮房照水烏山精今及采鷹爪得同拘右史𨽻題榜太和存漏壺劘牙虞吏像衣褐卯神圖蝎走收宵螫蜂歡保穴雛泉甘黃蘗舊茶雋白雲腴幽寂谷留馬凌歊舟若鳬山登天柱石沙暖句溪蒲洞啓三天祕灘愁六刺迂輕煙藏石女微雨浴花姑半夜笛聲起臨軒桂影敷謝公亭别范孔子井猶洙舟起鷺前導橋橫龍未雩子安飛逺近杜宇訴朝晡示爽歸田約懷氷灑篆娛白公謝霞綺荀媪進雕胡神王能旁逹心間免外虞白龜飛入楚赤馬棹通吳孤枕喧鼯鼠南亭聽蟪蛄貢先紅毯貴俗尚褐袍粗蟬蛻裴丞相聰明陸大夫劉詩送拄杖班傳出葫蘆露柱從師指金杯受賜殊漢書國史法心要藏經郛鮒活有竒術錦還真夢驅苦心思懿老一鉢走元孚潛隱大中主躬行外域膜儲神天北極繫念水西隅內屏如來地當陽造化爐千年猶可想一絶定非諛昔在中書省親聞大禹謨土階臨黼座文石上絲絇紅繞當階藥陰留一院梧不才持史筆有愧但書厨卜築隨鯤徙囚山與鵩俱忘懷從北院歸命只南盧作賦先招隱移文卒謝逋晚歸真發覆豈意辱噓枯黃屋南巡嶽侯圭畢會塗時持莘野鼎來采會稽菰聖主新更化羈臣首辨誣書修天祿閣遊並道山儒汨沒顔容改因循嵗月徂此生甘泛梗餘論許分符節近書雲日輪驅畫鹿朱川華氷片合山曲卧屛紆入臘占三白登堂展七扶人家多露積村鼓不鳴桴身奉三年最魂收一紀逾可無人歎息粗免鬼揶揄夜引星朝斗晨瞻日出嵎兩旗歎潦倒五馬忘﨑嶇嚴瀨猶如睦崑山恐是蘇深憐百口逐只辦四方糊旋磨魚千里彌縫金十奴何如今守馥猶愧舊官呼笏有看山拄歌無擊缶嗚江山真肺腑魚鳥自葭莩正賴管城子能招墨客徒李梅詩格律斑竹政規模事省囚寬繫年豐酒易沽近分天駟監遣牧決波騟苖獮申軍法蕃宣奉帝俞校旗推妙手嚙鏃視張弧杼軋絲雙繭篁包米一桴遇風專戒火聽雨甚憂墟酒盞經旬把歌茵特地鋪賜金誇魏絳顧曲少周瑜碩果園林密春山雨露濡木瓜紅鏤體銀杏緑勻膚栗發風前罅柑垂霜後株蟻侵梨釀蜜盤走芡圓珠野蔌多將􅀢春盤細剪蔞誰同九日菊難得一枝萸水閲尋魚鷘沙連合陳鸕愛間多閉閣因事或操觚敏捷慚銅鉢工夫體轆轤僧談曽接會老境合師瞿忩月重重鏡松風一一竽飫餐佳境蔗旋鱠早秋鱸本是煙霞痼何疑山澤癯計難出柏馬收必在桑榆舊事論新事今吾非故吾意中不足致身外復何須朝市安能隱田園久已蕪斯言誠有味端不減醍醐陪崑山邑官逰慧聚寺詩日暗蒲針緑風回栁影圓好山如有舊勝事頗相牽紺宇欣留屐炎官快著鞭神工盤岌嶪妙手活蜿蜒竒甚梁唐迹偉哉張孟篇皆寺中事故人逢異縣舊話説當年留滯江湖逺驚呼嵗月遷還同一笑樂相與對牀眠筆向晴忩落名垂漆榜鮮味腴知茗勝勢猛覺碁仙飛蓋干霄上危欄挂斗偏壓雲雲掩苒待月月嬋娟二軒名石鏤珍球怪杉重翠幄妍迎風拳乳鵲盡力叫飢蟬雨腳斜侵戶湖光逺拍天徐澆白玉釀笑折水晶蓮時節酒中過襟懷物外緣安居豈城市避世必林泉好乞彈丸地聊成痼疾煙山祇應許我木杪架飛椽再次前韻日走瞿曇宅殷勤問覺圓荷珠翻雨碎荇帶逆風牽安步穿芒屩長驅斷蠟鞭臨深呼屬玉騎氣道蜿蜒前輩幾人到髙情五字篇翩翩遺濁世落落度長年斷石崖蜂出喬枝谷鳥遷端為逃暑去復作拂雲眠心曠風林豁書乾棐几鮮丞方有公事尉亦從羣仙倚玉吾何幸棲雲志未偏久知情淡泊不夢翠連娟晚日斜吹綺新詩欲鬬妍微行窺沼鵠孤坐蛻枝蟬俯視千章木如臨尺五天韻髙巾墊角飲痛盞垂蓮小築堅前約兹逰定昔緣欲誇山聳髻安得思流泉却恐樽無醁羣憂㸑不煙誰來助清興吹裂笛如椽次呂居仁九日羣集韻衣冠交上郡氣象有中州九日一尊酒千巖萬壑秋星方聚吳分魚已躍王舟即事感今昔乃情無去留憂時俱出力濟勝合先謀北望邊風凛戎衣詎敢休七言絶句蔡倅羔羊齋有生不釀羔羊酒無日不誦羔羊詩賢哉蔡子勇成癖自勵要如三代時盡輸精白承休德政用詩書造太平略為周家推在位太顛閎夭散宜生題李成山水好山誰定識真形著白山人眼最親半夜忽聞遭有力中書君召主林神題程幹燕公山水電眼觀山老更真能分天造一層層直須擘華尊瀛手始解鋪張入剡藤石芥古人重改陽城驛吾輩欣聞石芥名風味可人終骨鯁樽前真見魯諸生長安官酒甜如蜜風月雖佳懶舉觴特送盤蔬還會否與公新釀鬬端方山芥濕帶青煙古澗濵氣含石理助芳辛山中酒醒涼生腦乞與文園渴肺人南山觀雪入山初與雪雲俱坐定雲收雪亦無不見舊時蒼翠色換將粉墨作新圖南逰客上妙髙峯拄杖敲氷袖障風卷起面前簾看雪煙鬟渾插玉瓏璁次韻書事西風昨夜入庭梧况味今年似舊無想見防秋有長策幽人真欲反吾廬聖朝始悟文章弊大霈首更詩賦科白葦黃茅供一掃英豪人物未消磨熙寧事作崇寧樣嘉祐政為元祐師但得至誠行號令坐令風俗似當時當年司馬溫公力今日宣仁聖烈尊哲后在天何愠喜要令元老雪沉寃天申節詩南來欣遇千秋節北向空馳萬里心永日清風吹古寺一杯聊見祝堯深明慶曉班催百辟鈞容仙部下層霄如今獨立薰風裏却聽羣仙奏九韶南華書事詩珍重南華五色禽雲棲霧宿見無因雨中恐悮翩然出我是間人非貴人萬木杉從一寸栽參天次第可推排他年空翠橋邊路來選承天八柱材真覺止能留一宿桐鄉今已住連宵却將膏雨下山去聊助南溟早晚潮火樹燒春明躑躅紫羅囊筆綴辛夷花枝照眼蒙清潤帶雨遊山亦自竒曲江漁者得鱖魚棄之目為師婆魚巨口細鱗初出網􅀢皮玳瑁乃同斑了無骨鯁人人喜更搗鹽虀發笑顔溪友漁翁忍棄捐却應遊泳得長年遐方未識珍羞貴不道楊憑已得仙夜夢采選榮辱悲歡反覆手競呼穴骼欲求功大開眼作人間夢何况真成一夢中惠崇蘆鴈我是江湖一漫郎鴻飛鷺宿見行藏西風吹盡蘆花雪水驛雲程未易量謝談南恩寄六目龜無了禪師劚草萊清江使者六眸開我今築屋虛空裏亦復蹣跚出海來乞雙峰山頻婆果我昔南逰三眼國逢人一笑啓丹唇祗今重到孤峰頂依舊丹唇一笑新事見華嚴三眼國比邱唇如此果我聞如來有佛眼結子成時速寄來從此慈悲修廣目得爭開處便爭開頻婆一名佛眼果延祥寺手植竹有甘露聖主尊賢方側席此君凝露美如飴形容盛德書生事請對佳祥著好詩穰穰天酒被修篁的皪枝間日射光豈為炎荒多熱惱故教灌頂作清涼月下對白菊詩人月下見梅花著力形容極口誇若使月明中見菊欲將何語為褒嘉飲氷嚙雪傳延年要比蟾宫桂子妍忽遇嫦娥蒙一盻桂花未敢著鞭先佛頭菊我杖常扶佛面強我花今見佛頭香靈山會上曽拈出一笑懸知是飲光金杯玉盤菊玉盤金盞世稱珍天酒瓊漿曉自盈天為我貧都乞我我雖不飲亦關情桃花菊菊花忽作桃花面放眼難看九月黃花不見桃惟見菊又將紅雨學啼粧雪見羞菊名白如白雪復何加豈有寒英勝六花真是嶺南稀見雪花光勝雪喜無差睡軒三首意馬心猿不用忙睡鄉深處解行裝華山聞有希夷子安得斯人與對牀諸公對奕我髙眠此法非人不可傳四腳碁槃皆黑子孝先從此便爭先風和日永飽食已雨急天寒戶不開遇此佳時無一事搘牀髙枕聽咍㘆謝惠楊梅杭州金氏越州楞撒火飛星五月春百果若重推貢士風流應不下平津南屏百步階頭長進步南屛堂上立移時明明萬象森羅處煆鍊雕鐫費我詩早來風定絶塵霾掃地如鏡忩盡開昏明四望移逺近晝夜兩湖分去來正當晝永六十刻久坐僧齋烹雨前滿園菜花開向夏一雙蝴蝶飛上天寄題競秀亭吳山越嶺老於行何地誅茅寄此情直使浮雲無一點千巖應接始分明來往人傳客寢安問渠何事駐征鞍只應門外千山好能使胸中百念寬觀烏龍山瀑布一日一夜雨如傾北山山頂垂天紳是間去海只咫尺緩流何用走踆踆五老峯前三峽橋不論時節聽飛潮那知冷落窮山裏忽見晴空練一條漱石漱流俱可意濯纓濯足且隨時到江莫作滔天浪妨我輕舟理釣絲題搓線圖誰言粉白但間居紉補尚煩金十奴治得棼絲有條理却嫌紅女未工夫舍後汙池有小魚數百遷之於江一泓已脫歸涔水萬頃初驚廣莫鄉且向江湖成自在幸因風雨得騰驤雪霽捕魚圖羣魚何日舉舟師玉海瑶山欲霽時正是嚴冬當設膾老翁香飯必先炊園中開牡丹一枝天下花王都洛京清明寒食走香軿東君欲表南來意一朵蔫然尚典型詠紫荆鶴骨龍筋結夀枝紅綃紫綺曝仙衣只應不奈麻姑爪獨領春風住翠微有惠新醬及酒者拾遺久住浣花橋生理誰能濟一毫攜醬藉糟來過我故人惟有孟倉曹聽鴿鈴蓬蒿門巷久張羅豈有籠坊重客過天外鴿鈴驚午枕兒童誤起聽長呵次韻董令升四詠尋幽亭帝遣銀河下太微餘波散繞野人扉此行步步有佳處盤礴孤亭試解衣競秀亭山陰道士頃留連應接煙雲馬不前君説江南亦如此我雖未到想當然性樂堂且置紛紛事百端從公繫馬白雲邊欲知太守樂其樂山色溪聲得兩全玉泉至寶何年伏九淵飛空散作玉聲琤那知夜半騰朝采會見長虹屬太清詩餘桃源憶故人辰州泛舟送郭景文周子康赴行在催花一霎清明雨留得東風且住兩岸栁汀煙塢未放行人去人如雙鳳雲間舉明夜扁舟何處只向武陵南渡便是長安路謁金門道山亭餞張椿老赴行在風露底石上岸巾愁起月到房心天似水亂峯清影裏此去登瀛須記今夕道山同醉春殿明年人共指玉皇香案吏點絳脣梅流水泠泠斷橋橫路梅枝亞雪花飛下渾似江南畫白璧青錢欲買春無價歸來也西風平野一點香隨馬案此詞據歷代詩餘增入朝天措五月菊玉臺金盞對炎光全似去年香有意莊嚴端午不應忘却重陽菖蒲九葉金英滿把同泛瑶觴舊日東籬陶令北忩正卧羲皇案此詞據朱彞尊詞綜增入
