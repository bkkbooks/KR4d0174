解茶囊不緣頭上五分白始與人間萬事忘一介逺勞詢近日十年如此住南荒只今已是交逰絶不問比鄰不擇鄉土瓜甘蔗窖深藏二物南中皆窖藏候春發青李來禽子在囊勝日園林吾有分暮年歌酒爾無忘掃除金屑不到眼盡力石田難救荒每遇北風長引領皖公山下是桐鄉湘江亭别程幹十年頻望秀而巉琴築齊音和阮咸硯浴珍材躬試墨畫收名筆旋開緘長江流自胸襟出大艑來如首尾銜分手一言君勿忘他時容我見千巖鄭元亞新居面梅開軒諸子讀書其間名曰擢英紛紛百卉不須栽一見論交正有梅詩興已從東閣動山寒併許北枝開影橫忩紙月為友香著硯屏春共來庭下芝蘭爭秀發對花君但莫停杯江上送客夜歸江干燕客酒如淮歸路飛輈破緑苔燈影入簾窺酩酊雨聲宜夢引咍㘆豈無文送窮行别似有人呼隱去來一念不生無可道此懷今欲向誰開送楊倅致政還鄉交説紛紛不憚煩要公小駐北歸轅三休恐負名亭意公作憩軒于郡圃以示歸意二去吾寧顧子言快指柴桑還我里遙瞻神虎到君門畫圖史筆俱張大又得楊家一巨源與錢端修諸公飲興福積隂解盡可信眉梵宇仍容欵扣扉山淨且無塵一點湖平惟有鷺雙飛杯行客惡思傳令劫急棋爭看解圍招隱不知誰好事為尋幽處著漁磯送蘇判院赴江東辟春風桃李正開花客路江山亦可嘉白鷺洲前浪山起烏衣巷口夕陽斜一星終矣君重往四壁蕭然我獨嗟元祐子孫今用盡如公豈合在天涯端午登郡城得白菊一枝天外飛雲結晚隂城頭清吹度虛襟江山已定南居計魚鳥休撩北去心菊早有花千葉嫩蒲香釀酒十分斟歸來卧聽黃昏雨與我尤親一布衾寄賀子忱昔嵗裁詩逺送君知君未可作間人那知半紀重相見全似當時只話貧推轂向來誰盡力彈冠從此不謀身想當六月苕溪上萬頃荷花一幅巾寄婺州歐卿德孺醉翁遺迹遍江湖何事東逰不到吳遂使山川有遺恨却看孫子步清塗沈郎帶減傳千古婺女星髙近六符簮筆便當歸從上蓋藍鞍錦照天衢與林大夫謝靈夀杖萬木山中美木成木生此山古今靈夀得嘉名龍鱗未測他年化蝸角先從每節生每節生四角禪擬問來須便打醉思吟後不妨行使君有惠憐衰薾欲報慚非藻思清以靈夀杖寄汪內翰一枝靈木堅多節千里逢人寄永州賜出漢宫尊子夏封當大縣慶邳侯衡山雲散迎歸騎湘浦春晴更順流欲往從公無羽翼請攜上座别愚邱喜見白髮詩種種年來漸滿簮兒童環視語相驚故人大半黑頭死老子何妨白髮生彈鑷不須誇手熟著冠猶喜覺頭輕元無粉黛居間屋任爾星星易數莖寄方立義方曾在詩西南一柱力擎天笞鳳鞭鸞下散仙不憤狐狸成窟穴亦知滄海變桑田夢歸丁令鶴飛去念舊徐公榻尚懸我是鄉人君是客興言及此淚如濺寄向伯恭天竺山前昔據鞍帽峩髙屋古袍寬髮雖比舊十分白心有憂時一寸丹雲路正看鳴劍履君門何早挂衣冠為公試草薌林傳歸日來紉九畹蘭次韻江子我病起食不下咽當奈何千金不惜聘秦和則知有我聊示病旁若無人正浩歌薄雨過墻醒檻竹西風吹暑下庭柯但令一局消長日且樂眼前休問他淵明以正月五日逰斜川時年五十豫以正月二日逰曹源菴年五十有二矣慨然書示同行城裏喧呼子不貪乃能從我就僧談平明且喜風收潤仰視只愁雲向南靖節使年慙過二斜川推日在前三吾生大似僧行腳好問真空覓住庵寄方允迪山隂興盡晚船催猿鶴歡迎入翠微為信在山名逺志便令滿篋寄當歸一牀獨設空諸有三徑就荒知昨非更賴仲容賢莫敵竹林從此倍光輝雨止讀陶詩有感涓涓泉溜木欣欣便覺居間思不羣快覩朝霞開宿霧少休時雨靄停雲無弦琴上宫商足有酒篇中醉醒分誰是知音誰可酌置琴罷酒對爐熏頃種柏假山中黃憲相訪見之後八年黃憲復持節來柏已長大兩石之間一寸栽與君坐看劚莓苔蒼官閲世猶如此歡伯喚人歸去來飄放又瞻新斧繡光華重照舊池臺他時左紐紋生後更望西逰老子回與羅教授飯園中種梔子園木交隂正可觀壺觴隨分却成歡緑錢流地雨當足飛絮暖空春不寒雪綴酴醿緣屋角香移薝蔔近欄干與君細説爐亭話強對檳榔蔞菜槃與郭侯飲園中穠李晨興著縞裙酴醿首出上瑶簮此時老子興不淺旦日將軍幸早臨敵手對棊消晝永中心聞射隔墻隂春生夜甕蓬萊緑酌我無多勸客深郭酒名蓬萊春華幹攜茶入園晚坐柔桑下光穿兩腳間彤霞聲急城頭集暮鴉且與鳳雛桑下坐共烹龍焙雨前茶的中薏嫩蓮新採筍上竿成竹已斜讀得齊民書熟爛把鋤今作老生涯喜雨欲行園南風轉北遂為霖倒掩書帷坐纍茵洗沐江山三尺雨莊嚴天地十分春猿吟鶴舞圖雙引酒社詩壇待五申説我小園增秀潤便思徐步轉城闉園中示客風急梳松墮碧叉雨多及榻長青苔趁虛阿段阿稽去挾册宗文宗武來不用張羅知寂寞恐妨飛鳥樂徘徊侵尋老矣成何事一日華嚴一卷開園中即事出山道士在家僧晚誦儒書早佛經灰盡此心猶木偶掃除往事送芻靈花邉過客蜂旁午溪上良時鷺適丁一到菊坡分品目玉盤盂可次金鈴至後飯客新陽為我解憂端梅破南枝雪造寒繡刺五紋添日刻餅炊十字薦春盤遣排百念有時盡邂逅一尊無限歡更待小晴拏小艇蘭漿重酹子陵灘送羅巨濟北歸君才可從六龍飛便合超騰向日畿曾使諸生館下立又騎一馬醉中歸江山得助雲蒸筆桃李不言春上機歸去來園花似海子行吾且閉柴扉寄仲彌性祝子權博士曽瞻穆穆光賢良猶抱漢文章江山不隔夢千里鴻鴈欲歸書數行蠅變豈能分白黑木災初未有青黃逡巡嵗晚成何事捧腹看儺驅不祥逰江醫園江避賊歸四年花木皆再種已開花著子矣避地歸來四閲春春來草木盡青青桃花暖逐桃花水竹葉光臨竹葉瓶閉戶自求安樂法活人時説衛生經移床却就溪邉坐照我新生白髮星遣興衡門秋到總堪悲荷折蒲荒不整齊但喜風前無立豹亦知砌下有蹲鴟吾徒老矣成何事生理茫然更久稽清淨無風天雨已山前山後且扶藜雨後告春亭飯客亭下荷花皆為釀家入麴久雨頽垣方議栽竹代之半夜簷聲挾北風平明賀雨走諸翁山人起向水亭坐野膳不求行帳豐麴糵有香蓮不死藩籬無闕竹成功間中自有間生理促辦牛衣戴此公此公笠也見王褒僮約有惠益母粉及當歸者多病年來歎早衰試憑草木為扶微關心藥裹知多少繫肘方書識是非曽子定應憐益母曹公端解寄當歸從今洗面饒光澤血氣仍充舊帶圍送崔若礪令河源雙鳬飛出九重關帶得中原氣象還抵死欲留之子住吹笙要伴老夫間草荒白鶴峰前宅雲散黃龍洞口山茉莉素馨聞已熟妙香從此賸熏班靜坐年來豈復為秋悲靜裏端能閲化機風引飢烏將子下雨催羣蟻運糧歸略無車馬間尤好粗有詩書家亦肥更得干戈漸衰息不辭長採首山薇送胡德輝抗章乞得清涼國已是無心瑞錦窠誰去自追戲下信時來寧免禁中頗三吳春盡天連海四月梅黃雨壓蓑倘有新詩求共和莫辭一騎送羊何送果州邵公濟分韻得其字蓬萊清暑按行歸却向西南萬里馳郡繼尊君家有法學傳乃祖世無師曹劉墻短自今日班馬香濃如昔時青士在旁知别語夕陽回首更凄其東津送方務德一年癡雨令人瘦三日佳晴送子回何以贈之青玉案我姑酌彼黃金罍尋春出郭非聊爾下水行舟亦快哉小試平生釣魚手老夫合住子陵臺寄鸕鷀源方允迪江子我世間豺虎正爭岐隱去何妨九曲迷懷人夢到北山北卜鄰意欲西枝西麥雲已有飽氣象梅雨又煩詩品題他日籃輿入源去尚期趺坐對青藜喜雪待雪多年久未逢兹辰如望故人風稍添松頂三分白獨露蕉心一寸紅泥尾可能留鴈使豚蹄何敢謝龍工不如借取公家氅著向飛樓縹眇中今年吉利好人逢萬玉妃來各馭風客坐暖浮茶乳白夜堂春動燭花紅心存帝所元非夢化出天城不用工却怪浩歌韓吏部巧分垤處與坳中嘉瑞真成一旦逢寄箋天下託鵬風分無侑坐歌眉緑但有挑蔬凍指紅畫史莫傳飛舞勢詩人俱盡琢磨工此間不見乾坤妙妙在竹扉山崦中分水縣舍夜遇大雪揮扇解衣真早計果然一夕變春隂屋頭瓦裂風掀戶牀上珠跳雪滿衾我自不妨髙枕卧人今更有惜花心此行特地非乘興明日扁舟興亦深元日會凌季文家伯達勸酒僕不能滿觴輒刳洞庭橘為盞壁間燈照梅影如畫雙頭荔戲伯達云柏葉椒盤巧試新大呼珠履集華茵香醪滿勸橘為盞紅燭未消梅寫真荔子雙頭歸有遺天花六出靜無塵稍晴便合西湖去尋遍山房洞戶春春逰久不出門心已灰佳晴作意苦相催鶯花世界共逰戲竹石弟兄仍往來心有所之無逺近興雖已盡更徘徊江邉漁父傷時切得遇郎君笑口開示同會案此詩據方回瀛奎律髓增入無奈春寒老不禁喜看晴日上忩櫺羣花半露乾坤巧百刻平分晝夜停拄杖有時挑菜甲桔橰無復問畦丁逢春不出何為者衆醉誰知可獨醒簡范信中天下皆聞公子賢輕裾長袖更爭妍青春自向東山好下客空懷代舍遷生活不甘詩冷淡年光專用酒留連直須萬里騎黃鵠俯仰安能在一椽正月十四日西湖留别同舍背淮轅楚過三吳鐵軸膏輪每疾驅千里未能歸北客一觴來此别西湖門門燈火動今夜步步溪山迎故吾明日歸潮君看取浪花堆裏嘯檣烏正月二十日過江氏園宛宛橋虹卧碧漣深深古屋背長川園官送菜無虛日溪友留魚不問錢厯數舊交俱老矣及時行樂且欣然梅花更有黃千葉攜取一杯花下傳三月五日遊劉光世園南髙峰下訪餘春霽草浮光暖更薰日轉暮山添著色風旋湖水作回紋飄零大士天花雨驚顧將軍畫棟雲興盡不須呼麴友他時來飯一甌芹閏月四日大風出靈鷲捕魚具鱠且約冬間再集西北雲收廓太虛東南風急放船初冬深更許侯設鱠地逺不譏公矢魚白小未容登燕俎紅鮮忽已間嘉蔬重生鱗鬛浮江去盡是先生所棄餘浙中有鱠殘魚俗所謂銀魚是也陪董令升西湖閲競渡馳波鬬艦疾輕鴻歌鼓喧天保嵗豐直面北風吹雨過卷簾斜日照樓紅吳兒戲水用長技太守行春如醉翁社稷中興豈無日羣魚躍水正飛空行樂何妨縱水嬉勸耕猶喜及花時風和官栁未飄絮緑滿園桑無附枝訓練指麾談笑裏清涼瀟灑古今宜西溪雨足歸舟穩會送髙帆入鳯池三衢胡定愍祠詩把酒論詩建業城三年金石見交情羅池忽待中流泊姑蔑應無劇雨傾直道豈知人負我英姿如在死猶生爐香銷盡叢祠晚獨對西風淚臆橫買田潼溪求田得處便成家笑為汙邪祝滿車潄石枕流新夢想帶牛佩犢老生涯歌成但可相舂杵客到莫嫌炊飯砂祭罷土龍春雨應穩騎秧馬一鞭斜過烏龍嶺羣山低首避烏龍行道驚看翠倚空地設中原如此險人無鬬志若為功九重頗覺天門近一卒能當蜀道雄細酌粉泉庵下水泠然歸去御剛風晚晴步謁楊令於烏龍寺舉頭廓廓見晴虛山色秋光得自如杖履可行三里近斧斤不赦萬松疏上人坐設刀圭飲乃祖家無擔石儲語罷寒溫晚歸去相逢應不問遷除離臨安日范伯達送茶約至釣臺烹之正月十八日宿臺下兼簡務德過盡長灘喚落帆舟人取火上髙巖已攜敗絮來投宿記有珍茶旋啓緘忽憶住時同短􅖼要須于此辦長鑱可憐一夜梅花雨點滴猶隨舳尾銜釣臺觀新刻范文正碑日角曈曈上蔡陽有星飛去避餘光東西怵迫謝新進南北逍遙樂故鄉載刻廟碑求琰琬一新祠宇照滄浪使君著意敦風俗更作髙堂榜卒章競秀閣案此詩據嚴州府志增入輞川遙展右丞圖盤谷中藏李願居龍睡潭深飛客棹鳯鳴枝老結吾廬但令蠟屐去前齒安用鴟夷託後車西望子陵三十里煙雲來往問何如逰玉泉坡陀石上大紳垂踞石跏趺世慮微奉引有春扶屐去送歸生月帶星稀一時花木助歡笑四顧風雲入指揮是日乃書驚蟄節鳴蛙已傍小池歸欵段尋山不著鞭每逢佳處且周旋生無一字誇金谷喜與諸公會玉泉雷轉正喧三級浪紳垂直自九重天有能庚伏留終日大勝朝堂食萬錢立夏前一日登馬氏山亭百憂不到酒三行萬事盡休棋一枰梅子未黃先著雨櫻桃欲熟正防鶯忽驚夏向明朝立便恐春從此地更數蝶飛來花寂寞亂蛙鳴處水縱橫夏日登葉氏山亭雲氣向曉不待族風伯忽來吹使醨溪南溪北半篙碧荷葉荷花一段竒旋扣柴荆行問道少休松檻坐移時淵明志廣桑麻長此語勿傳朝市知題翠波亭天垂疊巘翠相交風展文漪碧半篙勝日難逢宜樂此好山多買不為叨了無歎息同登峴忽有會心如在濠更看溪光山色裏紅霞蒸起萬株桃七夕日逰仙人洞蟬引秋風上桂枝登山臨水不勝悲獸蹲虎踞石見怪天劃神刓洞出竒無復碧藍雞刷羽空餘青栗蝟攢皮儻分衲子三椽屋當與仙人五日期晨光亭夾徑草深庵僧澄鋤去之將種桃李徑荒隨處長蓬蒿忽告通幽且盡薅已問花翁移郁李竟從金母折蟠桃住庵事簡吾何力種樹功髙子有勞吏用公材當小試把鋤來趂雨如膏晚步城外芒履寬柔野策輕晚來無暑步重闉人間爭夢大槐國物外誰尋小草民一鷺緩飛為我伴半川鋪練寫余真何從可覺秋消息忽有涼颸到白蘋冬至後三日與羅楚入倅廳兩松下梅花盛開取酒酌石臺上思得名手作松梅圖老松鱗甲待拏雲俯視梅花意亦親粉色上參冬嶺秀虯枝下挽越溪真乘間到此能終日與我來逰盡可人今代華光古韋畢生綃一幅兩傳神再次前韻匆匆前日賀書雲那似今朝笑語親年例一來窺雪樣嵗寒同此見天真梅間蜂陳長圍日松下鴟蹲反嚇人一碗檑茶未忘本三杯薄酒不能神冬至後雪夜臘前梅蘃未斜橫至後醅香試滿觥過眼文書開數葉打忩風雨又三更閉門髙卧直差易擁鼻微吟何似生稍取濕薪供熱弄住山如此不多爭送鄧清臣之行在老去何嫌雪滿顛放懷惟與子周旋起趨吳越時難得上繼張余理必然嶺海斷雲歸鴈底江湖春浪白鷗前故人相見問今我雨笠煙蓑事力田
