body:
  text: 灊山集卷二宋朱翌撰五言律詩賀陳內翰去非三首聞道催宣召傳呼入翰林堂髙初上玉帶重更垂金煩悉周公誥丁寧葛亮心調元知有日天意向君深夢獲生花筆祥開視草儒奉天專仰陸元祐只傳蘇蓮影光分燭絲紋細結絇禁中頗牧在夙夜贊神謨夜到甘泉捷光搖建曉魁唐家方再造漢德已重開太史書雲後羣公賀雪回十行寬大詔早晚出銀臺出城少䇿經營飽多方處置間樵談消一日野坐看千山白鷺逺飛去微雲時復還展開新樂地攻破舊愁關城上觀月月上孤城早山迎雉堞低四天浮沆瀣萬瓦貯玻璃松獵風聲北江搖斗柄西諸公宜欵曲吾且倚枯藜示葉令舟楫三吳客江湖二月寒交情元自淡酒味莫嫌酸日者坐何事君乎能自寬不來同一醉何以解憂端示李令春色遽如許春愁無奈何看山連楚越端坐惜羲娥吾子頻相見新詩苦未多試穿一兩屐從我上煙蘿轎中坐睡飽食登長道箯輿枕臂眠鼻間真栩栩腹外亦便便徙倚兩竿竹咍㘆四僕肩忽然成小憩放手即醒然寄王承可籍甚王郎子揚州一再逢至今清夜夢猶在笑談中想見芙蓉句空懷楊柳風著鞭來不晚聲價動諸公寄葉應之人老江湖外官拘簿領緣劇談嘗共夜好句得先傳行李無他阻朝廷有闕員相逢一笑喜已種玉為田寄符正民體力今何似函書闕到門匆匆緣不暇負負復何言此日忘疏逺明公實見存捫參懷蜀道叱馭憶王尊五更不睡擂罷城頭鼓膏凝燭下槃忩留三尺月纊挾五更寒事事華巾結年年紙帳寬梅花正好在青女莫摧殘曉出浩蕩乾坤曉凄涼客路窮小舟輕劈浪宿霧密糊空纍重苦無飯時危甘轉蓬但聞淮上賊不敢視江東初到曲江六首度嶺三百里攜家五六人卜居依古寺愛日向初春時有逃虛喜端無去客嗔團欒何所作不寐守庚申昭代人無棄遐方住亦堪司分大火舍官作世南男守拙休心匠忘憂縱手談平生不喜閙所欠一茅庵燈火光元夕歌呼亦盡歡欣聞雪霏白愁失荔垂丹老酒蓮花麴甜魚藿葉槃萬金書若到便可解憂端嶺外山川最天涯草木芬曽經五月狩俱被一琴薰韶石靜張樂舜峰髙出雲真同適魯見何異在齊聞草斷城頭路春來履屢穿雨餘峰染黛雲出嶺垂蓮眼傍青林轉愁來白鳥邉中原好消息問取此江船嘉卉懷炎德孤根幸斗臨象蹄交緑潤佛眼瞬紅深含笑香飄坐素馨嬌滿簮老榕雖擁腫六月十分隂丙辰人日雨雪此地從來僻今朝自古隂五年猶作客一飯敢虛襟春色豈終閟晨光宜早臨國香無恙否抱雪秀深林有惠曽公逍遙樓字者蒲阪今灰燼兹樓亦草萊如何三字大却到百蠻開屋漏真能爾霜嚴可畏哉置之當座右親手拂塵埃次韻胡明仲見寄二首胡示辨正論雙鳥鳴方盛公今遂著書浮雲供一掃直筆用三餘孔孟揚韓道乾坤日月如平生擊姦手發蹤去聲自桐廬栁州非國語意恐亂詩書去草絶根本立言推緒餘斷疑先近似反已問何如嵗晚飄零甚歸歟指敝廬歸自南華詩衆緑揚新楚初晴中薄寒行山無濶步陟巘有遐觀蕨紫拳猶小松黃粉漸乾無嫌一馬瘦徑度兩重灘南華具素飯烹茶詩頗有客倉卒初無具咄嗟家貧難辦素人衆不烹茶此老來修供兹辰並拜嘉小船橫一笛風引入荷花南華道中詩小市荒隄轉湧泉春水慳頻經石角鋪不上馬鞍山橋斷衝泥過松摧塞道艱草鞋牢踏雨更著一蓑還晨起曉日光穿户衡門起及晨簷垂氷折柱澗湧雪鎔銀臘取一時樂春期數日新曝書仍曝背自笑巧於貧遣興客去抽書讀愁來閉戶推眼花因酒劇書草更人催怪石巧依竹淨瓶香引梅悠然鑑湖念又向鴈邉回次韻張巨山正月十日逰天竺欲飯雲邉寺先尋湖上春山川良是舊嵗月又更新草長煙如積梅晴粉自勻久留知不可暫過却須頻猗覺寮晚飯卒律葛答美鉤輈格磔肥翁川茶不媚何氏酒今非硯水添池淺棊盤下子稀姮娥憐我獨未暮欵忩扉卒律葛答煎餅歸去來園南鄰劉家菜圃近許闢路相通假道趨南浦排墻度小溝仙人中謫李鄰里外依劉良友經時集清貧覺我優檳榔初不設佳茗或相投雨晴吳李過園中聫璧來吾隱交歡只賀晴酌泉心不易指李話平生萬木翠光合一池春水平更詢消遣法元自不容聲告春亭一丈寬鋤地三重密蓋茅分封鷗鷺境拾翠芰荷坳正爾賔中主居然國外郊老來俱倒置營圃不營巢竟日成清坐因行或撫松牆隂連曲浪木杪涌竒峰要路看公等間鄉屬我儂未春花已盡春到若為容自斷身將隱無嫌論少卑江湖雙桂楫天地一茅茨溪篆行蝌蚪林粧囀畫眉悠悠昏復晝聊爾給其私地僻地僻門常閉家貧客自疏溪山行老我風月不欺豫謾有書成誦端無貨可居清江千里道持此問舂鉏種黃菊白日殆欲寢黃花能起豫妙香來枕上正色立霜餘護外勞編竹培深更荷鋤收功歸我枕洗眼讀殘書重陽不見菊次諸公韻我圃黃花晚君行不下輿屏居甘寂寞佳節愧空疏小待西風急頻遊夏屋渠開時即重九那恨子來徐遲笑秦昭舅吝譏和長輿當時雖説貴退步不為疏萸實采重嶺拒霜臨碧渠梁王門下客先後有嚴徐歸去思陶令安時似子輿近知園可灌唯恐菊相疏酒幸濃如珀詩令價重渠看花隨早晚何必更因徐菊以黃為正紛紛秪皂輿待寒緣耿介縱老不凋迹秋淨花如染時遷水走渠惟留五字句能不愧應徐風流人稍間涉筆為題輿今我思黃菊攜君近綺疏先秋飄桂子出水老芙渠俯仰俱陳迹聊書嵗執徐西風吹露斚晴日駕香輿羡彼根莖茂憐豫齒髮迹功成身老健重味笑軒渠甘谷誰能汲瓶罌走莫徐豫多種甘菊入藥十月十四日立冬菊花方盛黃菊一何好持觴惟爾從名應稱晚秀色豈為人容正似花重九休論月孟冬霜威占清曉直欲犯其鋒夜雪夜集羣山雪寒欺一把茅紅爐無宿火黃絹有新抄坐久燈排粟杯行橘解包頽然投敗絮老懶信兒嘲謝雍倅寄佛面杖自得間居樂欣聞隱具來杖頭觀佛面掌內化龍才行變黃金色依然滿月開從今不妄出留上妙髙臺遣僧澄收刈潼陽下潠田將穫東屯稼亦收厭煩吾老矣為衆子行不一粒生何處千箱慶有秋灌溪明日飯今日已無愁送楊亨仲還建康湖海重相面干戈早脫身亦知懷琰琬寧肯就風塵船泛東吳夜梅尋故國春毛錐有持護如子豈長貧金秀軒詩金秀皆垂頴山園特有光牽牛髙暈碧滴露小勻黃老讀離騷傳兒尋急就章杜門觀化物吾得傲羲皇過王監園為問西園客秋花餘幾何敲門容剝啄此老正婆娑十月為春酒今年得子鵝舉杯邀月罷擊缶仰天歌戲事相逢多戲事聊以度長年間出詩聫句時因酒合錢歌狂無所擇棊勝亦欣然齷齪好苛禮逡巡不敢前七言律詩牡丹次韻一日春工過潁陽名園次第欵侯王風流得見升平瑞氣味初無世俗香早託筠籠馳驛騎旋張羅蓋護晨光最憐一尺槃盂玉穩上髙鬟映額黃畫舫何須載西子青裙今幸拜東王佛談非想色界色天造玉皇香案香興慶池邉凝曉露善和坊裏借餘光行聞綺席開東省飛鞚爭馳御道黃唐東省有看牡丹宴見南部新書跋司馬才仲六論溫公言語藥石譜猶子文章星斗羅家世有方能治國宦逰無地可降魔諦觀深切著眀論平視賢良方正科四海共知勳室後享年孰似賈生多題蔣山草堂俯仰之間迹已塵重來屐齒蘚痕勻晚菘早韭有真味夜鶴曉猿無故人萬一可償他日願再三須卜此山鄰北山大士乃吾祖蒸蕙肴蘭長薦新約徐令登妙髙峰徐不至衙鼓聲中百事休獨攀危磴看江流君修吏課中中考我且山行上上頭下視三千佛世界髙尋十二仙人樓聞思大士誰呼應願賜飛霖洗旱眸後兩日葉幹攜酒喜君釃酒吸鯨空置我飛雲卷霧中蒲鴿青浮初落蒂冰蠶繭就旋開篷小涼已覺生衣怯短策能尋熟路通直上髙臺延望眼萬山橫浸一溪東題水雲亭劉升道福唐所居沙合南臺會有期沙邉築屋俯清漪宋香陳紫丹成後渭緑湘斑族盛時長者時懷流水念老兄元愛白雲知一塵不到忘言處雲在青天水在池雨後登城上亭何堪濕熱坐支離且就虛涼看劇棊避雨唯應急走耳登城願丐少休之江山政此成三絶耳目醒然亦一竒突兀小亭吾畫篋真形妙境恣君窺觀李思訓幸蜀圖上青天路最﨑嶇藏日擎天却有餘既驗六龍行萬里始知一卒當千夫望雲騅穩無前馬帶雨鈴鳴動屬車縱有將軍天下筆不如無逸舊時圖顔魯公畫像結芻續體祭中丞鬼質何為苦見嗔千五百年如烈日二十四州惟一人朝衣視坎趨前死羽服行山即此身賴有區區張孝舉直言驚倒漢廷臣讀劉太真碑衮衣華藻刻堅珉下馬來尋剝蘚痕斷畫豈如絃可續闕文猶冀石能言鬛村故址今仍在螭首遺蹤碎莫存欲較智愚三十里又飛絲鞚過前村黃守不飲茶賔客相傳無水厄欣然脫屐上公堂滌煩療渴名雖著瘠氣侵精暗有妨夢寐無憂眠可熟清虛自積體尤強樵青竹裏管何事側聽杯行供暖湯寄范伯達薰風永日一簾垂剝芡從容待晚炊舉白且看連引滿汗青不用歎無期晝思夜夢人非逺客附書來喜可知千里與公供一笑何時相遇戰低棊次韻劉美中早朝鳳凰山下鳳凰城輦路凌霄遡紫清秋入九天風露冷雲藏五玉佩環聲虞淵出日升黃道織女斜河轉啓明鬱鬱安能久居此君王有意待還京題日涉園詩一葉黃時秋氣清三山轉處大江橫禽魚自有親人意草木皆能識履聲晴望髙崖尋李願酒行半道致淵明將詩與結江山好他日來逰分不生寄胡明仲尺一催公想疾驅盛傳今已過羌廬紛紛眼底何時定鬱鬱江南更久居陛下不妨髙枕卧先生來草射聊書銅駝可惜埋荆棘會有人能為掃除送王端材以宣諭屬官入川使星入蜀動佳占幕府謨謀要子參天下兵戈連嵗月朝廷根本在西南路經九折休回首事考三分小駐驂想見梅黃飛雨裏前旌已在百花潭方竹杖此君骨相一成矩氣稟坤爻六二全運用四方隨手轉操持一節比松堅玉雕界尺疑同樣金作觚稜笑削圓見寄分司真得力時將緩步與周旋萬竹亭東坡名文與可篆氣稟元軒玉立身露幢煙纛曉初勻一時頓有七賢集千畝今餘萬箇春能以風流誇後日政緣名篆得斯人寂寥不見平安報只有東風為掃塵頃入南華僧仲有詩為次其韻仲欲見豫詩集促駕難求馬一尋行纒快走任山深上方首入文公褐小語能披逸少襟三尺盆池清照影五更忩月默傳心更煩細看門前水昔日西流何似今寺分三集易披尋藏在名山意亦深但與止兹鸞鳳友共逃不學馬牛襟年來惟以睡過夏老去莫令詩嘔心欲見文章須近北太平風雅盛於今約鄭公績出城頗厭低頭看文字似曾有約到南山稍回妍暖日自喜掃盡積隂天解顔便合與君聫騎出更誰如我兩人間相逢莫作傷時狀且趁春光競往還寄江東故人北風號木造秋悲書到江南九月遲鴈過宜頻問消息詩成猶得慰相思想當雨淡煙昏處又見橙黃橘緑時若到北山煩寄語道林真覺乃吾師冬前雪珠夜下早聞逺山皆白夜深真可覆三氊地僻何因致八綿五嶺盛傳非昔日一寒如此怪今年固知淵客難藏寶倒卷珠池立散天日下有丹能變白青山休恨早華顛雪作兒童以衣袖盛之如栁花狀六花幾嵗不來南大似優曇欲遇難瓦響急傾鮫淚顆袖寬先得柳花團莫憂荔子眀年少已是梅英向臘殘骨冷魂清北風裏更臨江檻俯驚湍龍山送客茸茸風草弄春柔密密桑隂向緑稠江上星居多草閣波間斗轉一漁舟吾行適此心無事客去何妨刺漫留尚戒奚奴休叱馭不辭小住看潮頭煩人置葛飽誦韶州白葛輕十年曽不慰前聞芰荷欲使風裳製溪谷難褰霧縠紋坐甑遭炊無可避踏氷赤腳謾多云試將一事煩吾子粗綌精絺可細分七月一日夜坐觀星半夜涼生過雨初起迎