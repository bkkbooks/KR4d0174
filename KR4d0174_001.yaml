body:
  text: 灊山集巻一宋朱翌撰五言古詩雙魚花物生本不同所貴以形似如何小草間或作潛淵類宛然花葉分有此尾鬛備如以栁貫腮十百共一蔕可肩比目鱗與世為上瑞稽首蓬萊宫願附花鳥使送山芥與徐稚山北風撼坤軸飛雪封髙崖萬草坐凍死不復存根荄蔚然蒼山底有此紫玉釵本無塵土侵寜畏霜霰埋偶為樵牧知遂與薇蕨偕堅瘦故耐乆苦森終怒俳未免一時出肯事衆口諧可以寄樂天時供八關齋可以送庾郎三九代食鮭朱門厭燖煼嘉蔬日誰差飛觴失行次可口相推排爾來走缾甖遂費登山鞋文昌列宿光騎省後人佳居官乃退歩養氣能實骸一箸須子同苦硬求吾儕淮人多食蛙者作詩示意淮人為水族庖膾亦已巧田間有鳴雞性命得自保吳人口垂涎捕取窮浩渺於吳産或多於淮求則少要之業境㑹食債良自繞予也家淮南遊吳嘗草草平生下箸處但覺皆羊棗不論赤鯶公亦及長鬚老何况鼓吹部可作鐘鼎寳世間多空中所見徒有表至美不外示魚鼈豈皆好君㸔十月鶉羽翼甚輕矯變化湏臾間不念舊池沼食鶉乃無言食蛙或顰愀鶉蛙等無二妄想自顛倒舌根無盡期所得在一飽哀哉南路徐食方説燖煼但俱供芋羔不必著錦襖較之食瘡痂豈但能稍稍游月巖詩赫日方正中忽見第二月老木盤硬枝扶疎真桂葉烟雲成顯晦弦望靡盈闕初無大小餘可以厯沒滅但能照行人千古此山側却笑天上輪晝夜不停轍張翰恵書告窘伯龍營什一撫掌鬼在側燕公鑄横財地下萬爐熱貧富有物司得失難智索我今竟日餐或待門生設朝園斸菜根暮火團松節黄妳坐上座方兄行禁謁安能决餘波可以潤子箧俯視腰一圍何時解三篾薦福縱有碑震雷即驚裂讀我送窮文還君乞米帖與劉令食枸杞周黨過仲叔菽水無菜茹我槃有枸杞與子同一箸若比閔縣令已作方丈富但令齒頬香差免腥羶汙我壽我自知不待草木輔政以不種勤日夕供草具更約傅延年一飯美無度解衣髙聲讀蘇陸前後賦王令收桂花蜜漬埳地瘞三月啟之如新桂花老月窟墮地㪚金蕋長憂風雨餘失此香旖旎撫樹三歎息留花姑少俟枕中有仙方解使香不死蜜蜂喜輸糧餘潤獲漸靡瘞深閲三月發覆驗封璽虚堂習新觀博山為頻啟初從鼻端㕘忽置秋色裏氤氲縹緲間可以降月姊自兹聞四時何止名七里與郭令歩至城下見田間稻秧已可挿慨然有感示郭令端居倦來往春去誰與娛眷眷斗升米翛翛東南都薄暮喜穿屐同逰又吾徒念昔始經此汙邪祝滿車及今幾何日立苗還欲疏懐新舞翠剡生意蔚以舒吾生将安之土偶之與俱清夜夢鄉曲未覺田園蕪他時招子歸把鋤春雨餘重午菊有花遂與菖蒲同採菖蒲秀端午黄花作重陽萬物各時行半嵗遥相望云何忽並開相與同一觴仙人九節杖東坡一枝香洗去仲夏熱如逢晩秋霜均是酒中物俱使吾年長莫誇雨露私勿笑草木狂登髙閲競渡樂哉未渠央競渡示周宰英英屈大夫遺骨淪湘湄楚人念何深叫空寃水妃雖無些詞招顧有鐃鼓悲憶昨上已日縱觀金明池突殿隠負鼇長橋低卧蜺諸公貴人來珠幢紺幰隨兩軍各氣熖萬楫生光輝龜魚戢影避虎龍挾翼飛想當大軍後益覺遊子稀况我中興君髙拱絶宴嬉覊人老淮楚古寺臨長溪節物亦撩人風俗自隨時徃來兩舴艋規模具體㣲邑人樂豐年聚觀眼不移捐金賞先至頓足助絶馳在昔攻戰具今但娛羣兒因而語兵法可以威四夷八寳水中央大海壓左圻其中椎剽姦連艦揚皷旗先事能預防在易則見幾作詩示周郎赤壁有成師竹枕方牀洗湘斑夏簟織蘄笛誰與同卧起青奴甚相得嘉哉直節君契分近愈宻深林捕貓頭乃復枕上膝直從無熱天徑下清凉國早晩報平安一覺我自適夢中從我遊子猷推第一西園月夜竹影滿堂良夜天徹幕林間月如篩解與竹傳神月娥真畫師東坡元不死鶴駕相追隨習氣未掃除戯筆聊一麾調和水墨勻幻出虯龍枝圖成不挂壁擲地容俯窺欲進復小卻尚慮鞋底泥初直省宿薄暮欣暑退吏散列閑屋氷㕔冷如水孤坐一巾幅乆絶青綾賜僅免牀下伏何嘗語丁寜但愧頭蓄縮頻年耗太倉初夜費官燭枕書倦已抛夢蝶來更速咍㘆到天明從人笑列宿次韻胡明仲見寄去年玉笋班仰視見櫑具論事似陸贄任事似裴度今年起衡山出守非不遇床頭㸔周易象在益長裕解琴湏更張謀國乃疾固要開天地爐更使萬物鑄可憐氷氏子大似鐡鑪步自謂樂於貧公乃知其素來刪城旦書聊免吏部注祝公早來朝為上寛北顧送張巨山天方六月暑君有千里行相從苦不欵惜别難為情發軫子胥山落㠶石頭城火雲午尤竒水風晚更清輝輝螢自燭嘒嘒蟬爭鳴今代太史氏昔者蘭臺英人如晉宋間詩與顔謝并吾君志恢復求士出至誠玉堂紫㣲省待子來經營七月十四夜月分韻得明字澹澹烟覆渚嗚嗚角收聲白毫萬丈光下注千山傾良夜三五時玉樓十二城皇天老眼開碧湛雙瞳睛窺我讀書忩徘徊到天明風從樹頭來挾我入太清飛螢轉蒿叢熠燿徒營營露氣下庭宇秀爽凌冠纓以兹無盡景對此不平鳴不如使雲遮寂厯忘吾情有感退之傳毛頴歩驟過遷固當時不入眼怪笑且驚怖栁州極不平裁書細説喻浮雲蔽兩曜慿虚亦暫駐何傷黄道行終古元氣聚嗚呼古今一吾其祕緗素曉上烏石灘急灘上水船進寸輒退尺老夫敢穏坐解衣起佐刺凡我同舟人有力俱不惜已濟各相賀可以正枕席反觀順流人如電亦如射艱難與快意等是時行役月落東方明雲收逺山碧翩然兩白鷺過眼已無迹天地正爾寛何苦自跼蹐脱帯且腰舟歇我履一隻章質夫帥廣時以酒六壺寄東坡於恵州書到而酒不至東坡有詩傳在人口思召作廣東漕翌適居曲江亦恵六尊且云吾家故事也為作此詩西樞鎮番禺紹聖之初年覆露落南人雅意極周旋六尊南海春萬里羅浮仙先生洗破觥使者張空拳五十有六字至今星斗懸君持澤國節我賦囚山篇欣然故事脩要使家法傳禮等百牢我情均一觴天夜來燈有花不憂爨無烟但恨語無味何以追昔賢三月旦行園我栁已飄絮我筍亦上竹雪氊宻盖地犢角横入屋兹辰略行園喜色動眉緑炎荒異中原氣候少清淑一日具四時旦暮變寒燠而我於此間兀若蠶上簇但愛草木長遂使杖屨熟喜甚得小詩意㫁語不續尚可羊何和不用唐衢哭諸公幸無事來不待休沐牀敷三百棊勝負任反覆飯大涌泉入紫㣲洞洞乃余尋出山川有佳處神物嚴守衞自非夙有因孰敢發其祕衆壑擁流泉青間見白沸洗我杖與屨時作深入計要須鄉道先行與老人值指我洞壑已忽不知所詣劚荒剗巨石稍去眼中翳豁然大厦開位可百人置嵌巖一日出自此沓逰騎開山屬老夫愛山必同類甚畏長風寒當暑皆斂袂歡伯遂行登相引入勝地嵗乙丑余年四十有九矣因誦太白四十九年非一往不可復之句次其韻南來不贏糧隨身一竿竹四年釣曹溪溪水香可掬求方駐隙駒辟糓起黄獨五十止欠一何地可歸宿今晨祖師前一擲杯珓卜去以六月息來期七日復徃事一局棋信手不必覆吾生行休矣自此生處熟題劉憲十君子軒北極元軒氣受命惟爾獨四方散子孫萬里異閩蜀戴譜六十一嵓谷無遺録段記三十九㝠搜出隠伏世若不盡見誰為合其族儒林老丈人與世談無欲開軒延十君跪坐進三沐髙低列雲來新舊間伯叔團欒十家春門户各清肅客至為巻簾賛名問寒燠一見伯玉輩遂使季子服我欲作竹史就君求品目予居曲江五年今嵗又暮慨然有感坐對研旁峰卧閲屏上山一事不掛心萬病方窮源吾君禮南郊吾母望北還一嵗幾得書五年闕問安是自取之爾尚復何所言手種庭下梅花開聊喜歡繫日既無術縮地良獨難寄江東王端明徳人大江南壺歌温玉帳三嵗豐年玉民倚嵩華壮政碑滿七尺賜蓋髙一丈平生詩有聲行與李杜抗餘力到行草妙合晋人様如此未賜環頗復辜衆望前時幕下生今作倚門骯故國動逺思一夜清江漲身如龜甲巻書自魚乙放南風造新凉爽氣來疊嶂壺觴得自引茵鼎保無恙願公介厚禨中卣調秬鬯十月旦讀子美北風吹瘴癘羸老思散䇿之句初寮甞作十詩因次其韻戰休左觸氏夢破大槐國肝膽方一家燕越非異域是中路坦平本自無降陟乾坤有乾坤無極復無極海角盡東南天門洞西北萬里無寸草何人不相識亦有鼓刀兒大烹舉銅鬲其二問學要根柢文章忌雷同字求反切當義用訓詁通縱之逼論劔收之入檀弓平生苦我心不如作一農林間瀟灑侯川上赤鯶公姑從賢者樂勿笑鄙夫空秋宵引佳月暑晝追凉風如此了一生我其塞上翁其三戱語隴頭子與若本等夷朱紫强包褁本非我所宜失脚落番山杳杳隨風吹将買二頃田樹以枳棘籬還我本來面度今正其時此䇿我自决欲問其從誰譬彼沈疴人忽然飲上池窮命可抵虎寜畏山林魑其四老火已退師寓客不憂瘴静坐窺物理一一見情状用起舉拂子功成卓拄杖五行更主事衰絶變生王此身屬造物窮健勝美恙其五厭晴思滴瀝閔雨思開霽姑欲快吾私豈暇計豐嵗身如姑射山物物無疵癘可笑建除家卜日論開閉堂堂百年中顧已閲半世徭蜑且友朋百粤即魯衞其六子房憫濁世意欲一洗為五日老人約何乃數後期功成去學仙辟糓從清羸豈不知自苦反覆加深維志士極鑽仰堅髙今益彌是為萬世法何止帝者師寜知取履時幾欲真毆之其七兹辰馭北風所至有東道把袂問浮邱餽芝走商皓著裙拜木公獻寳出富媪氣平四大和以此可却老長生等終古彭祖是亦夭有客詣理窟相過或談妙再拜有所乞乞我如𤓰棗其八南來走炎荒北歸定尋思一生困坎壈憂患真吾師堂中木上座萬里唯爾隨方幸得良喜那肯懐秋悲但令今可行勿愧論少卑少時不解事日日荒于嬉投老又懶惰得一或十遺戯我過此生造物真小兒其九中夜念凉天搔首坐待旦北風鳴屋角此懐忽凄斷兒曹計伏臘極力供井爨憶昔冬來南骨肉遣星散念兹豈人為稍定理絲亂呻吟裘氏地皆是儒與緩往語執金剛勉力守門閈倒嚢留一錢且免用鞭算其十囚山無他謀治生出下䇿載之百漏船吹以無孔笛一飽乆定矣誓不為欣戚家山天一方何地休行役天其調伏予中嵗遭逺謫養成一牯牛露地見純白寄無錫諸蒋夜帆起犇牛烏竿鳴五兩百年幾寒暑兩嵗五來往竟不到恵山閑日真難享聞道山中泉煮茗蒙珍賞當年京淅遞不洗牛李黨故人在邑中乃漢三逕蒋欲擊月下門正想鼻雷響兹山君常到此約吾又爽且復卜後來歸程一陽長王承可有招隠黄龍之意通途無寜軌世網闊遮邏九遷食肉榮一餉在堂賀泥深迹逾深時過事亦過要之鐘鼎飽不及薇蕨餓吾知此理明甘作蟻旋磨丈夫當勇决勿使良便蹉黄龍百丈間山圍天幾大徃丐一椽茅撫枕得髙卧不能賡梁噫且復繙屈些賣藥足生理故是伯休那當年白鳥盟肯為青衫破㣲官亦漫爾棄去不啻唾王子里中人到處成穏坐儻不食前言扁舟在公左羅巨濟闢學之西序為軒以奉板輿之樂余名之曰難老軒龜息六用藏禽戯兩翼張俛仰何自苦要與宇宙長深山具竈火煮沙烹硫黄此又出下䇿中乾外徒强我有不朽計事具泮水章佳哉羅江東意師張曲江重席坐日永脱屨來鴈行舉醆醉六經抵掌談三王青雲去一蹴壽域開八荒始知吾道中大有却老方以此施其母何疑壽而康煌煌忘憂花秀色迎朝陽願子多釀酒容我時登堂徑山白虎寺詩遶郭尋好山直北得覩徑一重復一掩間度略彴峻溪聲出左方環玦歩相應萬木儼扶持四山擁清潤髙疑星可摘况乃斗之分諸公恨到晚六月宜問信頗聞開山老説法起衆病坐受於菟降了不懐寸刃山僧詫神通辯口紛若磬我豈必勝哉渠自有佛性告春亭詩東臯有佳致中夜雨一犁喜笑作春聲麥塊青欲齊淺瀨發清響陳根出新荑紅情顔未破翠顰眉上低練巾已堪岸藜杖始一擕殷勤遺好音胡盧來勸提送鄭公績赴試金陵庭槐著老花佳興𣺌澄江束書望故國飛㠶響篷窻白袍㸔先登唾手築受降從風靡彊燕舉火燭老龐秋天鴻鵠髙驚到中疊雙閨人侈宵占玉蟲綴燈缸君到洗沐已蠟屐欵北山吾祖山中人凛然千載顔其旁馬鬛封近去龍衮間通鑑恰施行新經宜少刪世上有公議渠自明忠姦物情有報復天道則好還昨日天子詔痛念并州兒儻有長轂動何憂折箠笞似聞當宁歎頗牧今何之豈惟一方痛其勢又類腓䇿士仍三年側席收六竒誰當挽天河洗出中興碑筆端忘杻械舌本貴温潤明明獲麟書作世大龜鏡哀哉束髙閣斯文乆不勝皇天開老眼牽復首拜命秋來舉子塲誰領斯文印向來鍼膏肓必古司農鄭念我荅颯乆區區勞此生借屋就瞿曇長湖繞廂瀠未了文字債截蒲坐縱横天公喜相我貺以秋風清他年載兼兩䇿勲首短檠飢吟愧峩冠誰知此心傾孤城挾龍虎盤礴納萬象馮夷遵節制旦暮過稽顙君今搦寸毫意與孤鴻徃雄豪攬千古光彩發萬丈憶昨吏三年到今餘夢想古寺壁間名勞君拂蛛網我缾無儲粟世累如綴纓讀書寡見功一飽不可營鱗差四百指習慣啼飢聲天豈私貧我客氣略已平安能事計然且復師淵明儻有故人問但如詩所稱髙軒過我數相對心跡清共乗殿角凉劇談新月生稍作蓮芡費乆絶壺觴傾告我買夜航襆被催宵征秋晚破敵歸連營稍休兵青雲付一蹴齊晉多世卿七言古詩豹隠軒詩金錢暈花山中竒七日霧雨人不知一朝躍出從於莬毛羣驚駭光陸離釣竿在手身在野未用聲名動天下乆幽則見理則然世間豈有終藏者道人見笑皮為災羔裘要袖孰剪裁男兒獨患無文爾聖世何憂不遇哉羣玉亭泗濵石窟如蟻族巧匠琢山如琢木不問人家與官舍軒窻隨分作巖谷符離城東石更多天劃神刓相倚緑當年來過玉局翁拄杖敲門歩幽麓翼然危屋誰所興賜以嘉名號羣玉翁家自有小仇池壺中九華伴孤獨經行趣尚絶世姿醜好例皆蒙紀録銀鈎爛爛照無窮走馬來㸔僵立僕是時官梅香正闌亦有海棠紅映肉老翁盖棺二十年世上遺編數遭獄只今見字如見人滿眼清風亂庭竹想當入海期汗漫雲車屢下僊山曲仙山縹緲虚無間我欲慿之兩黄鵠大雪漢時長安雪一丈少陵有詩不吾誑今年廣陵雪一尺忍寒長作縮龜狀從來窮巷説多泥自是泥深勞拄杖閉門不出動經旬出門無路将何向故人乃遺咫尺書逺祝長鬚問無恙濕薪如桂米如珠有突不黔旦踰望但擕古鼎燒黄連香穂流珠凝碧帳崷崒窻間石數峯氣凌太華嵩衡上黄楊冬青壓餘滋碧幢羽盖排仙仗蒿廬頼有此清絶興來何用山隂訪飛鴻似帯燕山書重氷怕結黄河浪元㝠得意愈自嬌嵗律囬春未全壮吾君曲軫天下寒語到三軍真挾纊自憐難備絶域使規模但可山中相起來舉手祝羲車何日金箆開眼障溪南大雪示常子正王者有徳琪樹生兵馬欲洗銀甕出天将以寳奠中原何用真如傳恍惚沙寒汀冷鷺啄氷藻暖餌香魚近罾梅花抱蘂不肯吐斂袵且讓天花升朱門歌呼正圍妓江上獵圍飛鐡騎惟有書生無所為下帷煮茗候湯沸用禁物體書雪宵分獵獵風翻幃平明漫漫雪擁扉髙粧老樹枝不舉深壓野麰根漸肥削平履迹頃刻盡吹落楊花從來稀飢烏大有在陳厄循階入户冷不飛我曽倚頼東風暖驅兒出市典衲衣不料元冥賈餘勇小窻無地逃寒威起來塼爐薦軟火敢營肉陣張妓圍認香尋梅亦不惡敲氷煮茗寜皆非掃除習氣幾時了忍寒琢句聲益㣲東坡先生六一老當年格法誰遵依不量吾力效跛蹩從今望炙晴簷暉韓幹二馬圖飛龍翔麟夜不關房星之精下人間一鳴墮地勢千里四十萬匹中如山皇天生此意何在天意有在平百蠻百蠻欵塞皆稽首干戈包盡於菟斑剪成三鬃代官字濯之太液登王閑紫壇謁天五使出玉輅扶日雙輪還寳鞭不用繡韉穏扇筤前開曲蓋彎方知徐行備天仗絶勝疾走周人寰開元距今四百載人物風流無一在如何兩驥今尚存好手傳神能不壊請從此畫究規模便見當時似三代人日雪天公號令今年早阿香動地連催曉今朝纔及七日人却見長空六花擾我獨塼爐坐畫灰扶杖出門愁屐倒細挑生菜羔鼎香落盡梅花粧額巧詩成思發在花前更願晴多怕晴少君不見貞觀有道幾成康誰其致此唐文皇一時獻納盡豪傑鄭公臣徴尤激昻當年入見適此時見謂人日宜相當有如此人當此日整頓乾坤纔頃刻夜夢與羅子和論藥名詩鑚破故紙我拙計該貫衆史子得意籖排百部象齒懸陟釐萬張蠅頭字分甘遂如百兩金作苦躭成五車記地錦天花出妙機瓊田水英生爽氣詩成欲度甫白前冠彈請繼王陽起天門冬夏鳶尾翔香芸臺閣龍骨蜕任真朱子老無用得時羅君政如此今宵月白及風清想君不作呼盧㑹泉石膏肓肯過予飲量定能加五倍吳道子華清宫圖霜清十月天無風行宫縹緲祥雲中重重繡嶺光相通荘嚴具足無遺功泉鳴三湯春濛濛合歡皂莢雙垂紅人間塵垢一洗空玉聲璆然出房櫳鸞吟鳯舞紛層空豈不大勝遊月宫向非道子妙絶筆那見開元全盛日槎牙老木青銅柯坡陁巨石蒼玉質石言木應苦何聞阿房興廢纔頃刻乃知吴生有深意一時心事能貌出臣非丹青好畫師臣以畫諌乃其職此山此事姑置之此畫當今須第一觀獵㑹圖一日射雉六十三命中要是人所難一日射虎三十六驍勇無前誰不伏沙平草軟雪泥乾手拓弓絃腰兩鏃祥麟選馬㨗若龍翻身已墮雙飛鵠拜賀将軍箭有神摩旗拍皷轟相逐錦褾大袖掛虚堂勇夫視之心發狂不如緩帯氊車上舉酒割鮮殊不忙送硯與周宰巧匠斵山取山骨媪神拱手不敢惜因隆作防窪作池以金為聲玉為質藉以綈衣便挈擕置之烏皮長拂拭憶昨隨計西入關太學三年同寢食晨昏綴緝困蠅頭嵗月磨研取雞肋時來偶題千佛經吾自無功子何得祗今懶慢大可笑身外了然無一物經時不脱管城帽子宜不賜湯沐邑我今容子乞身去却到安宜宰君室宰君真是瀟洒人文章機杼乃自出陳元毛頴費追呼子堅而厚宜比徳從兹去給上方札便當入珥螭㘭筆切勿勸草封禪書亦莫上獻開邊䇿願君發明錯與誼昨奏條畫今所急忠言讜論聞四方硯乎汝為不失職簡宗人利賔昔時桐鄉漢九卿家在淮南天一柱石麒麟冷一千年子孫不敢去墳墓我之曽髙主宗盟昭穆亦與公家敘不容妄繼鄼侯蕭何嘗敢掘城南杜深山大澤塹刼灰甲第名園走狐兎飄零直見似人喜何况乃與吾宗遇為善本求鄉里稱浩歎正坐儒冠誤出㕘留守入坐曹抑亦為此㣲禄故灊山山髙灊水深眼前誰作藩籬䕶心隨大信小信潮夢遶長亭短亭路生涯舊欠錢一囊歸装或有經五庫今子新從彭澤來歸去來兮幾時去一杯且遣客枕安百尺竿頭同進步觀諸公打馬詩酒酣侑坐展博局分曹並進角馬足過關驗齒出天衢入關未掩繞日軸十驥并驅縱來徃一将折箠制起伏擊前疊後㸔騰驤避塹守狹良局促緩時必若出門殿妙處正湏蟻封逐孫臏能令田忌勝諸人徐賀塞翁福障泥在前解則行杜蘅可采帯宜速莫疑檀溪墜三丈終使青雲成一蹴吾家欵段乃如狗敢上夷塗陪驥騄但能書與尾而五未免以筞數曰六歸歟秋滿華山陽茼麥倍收連苜蓿聞隣舟琵琶檣烏逐風不停飛尾燕掠水東復西蠻絃金撥竊私語行客轉頭聲更悲擾擾雲吹寳鬟緑新粧半隠朱簾曲無限柔情指下生誰道彈絲不如竹谷兒指法來帝城曹供奉傳新曲名香山居士家有此何况更聞江上聲路轉溪回雙櫓咽弹盡胡笳十八拍山頭日落暮潮平一帯荷花自秋色石斛栽蓮數夕一夢吴淞江兩槳飛度荷花鄉刳中山骨泥數斗趂雨屈盤三節藕鏡面光寒溢井花四顧無人下渇鵶老翁真箇兒童似我非韓公亦兒戯緑莖亭亭忽獨立簾踈不隔香直入宛若船舫坐促膝遂使江湖在方尺雖無太華藕如船定有廬山房似笠摭遺載齊已於廬山瀑布中得蓮房大如笠端午觀競渡曲江楝花角黍五色縷一弔湘纍作端午越人哀君檝迎汝呼聲動地汗流雨魚蝦走避無處所小試勒兵吾有取樓船将軍下潢浦佽飛射士彍强弩大堤士女立如堵樂事年年動荆楚却憶金明三月天春風引出大龍船二十餘年成一夢夢中猶記水鞦韆三軍罷休各就舍一江烟雨朱簾夜隠隠灘聲細巻沙沙淺灘平雙鷺下南園用端中韻有韓太尉淮隂家十年種木今開花松隂漸可張翠葆桃蹊乆已蒸紅霞早來雨過著芒屩曲沼鏡平清見沙道人從我似支遁公子立名非務華劇談坐致千嵗日黙誦初無一字差主人負重守且将一手撚箭腰黄蛇因來小集休沐地何時共聽歸來笳飢腸欲餌桄榔粉香身要采毗陵茄凉風翛翛引佳月歸興忽起從棲鴉誰憐老我夜不寐兒曹見祝無多茶八月十四夜對月效李長吉雨江洗出揉藍天結璘下鋪白玉筵尾箕斗牛珠一穿連暉接影墮我前整襟危坐天地黙不知夜漏下幾刻飛螢一㸃從外入白露下濕桂子香藍橋雲英正賣漿金盤荔枝龍眼雙題校書圖我聞校書如掃塵塵隨帚去輒隨有螢窻孤坐志不分帝虎魯魚相可否榻上諸公富貴人安能辨此鉛黄手緑栁啼鶯耳畔春翠袖彈絲眼前酒如何復窺蠧簡塵又借管城公作帚畫史畫名不畫實潤色丹青傳不朽我是瀛洲舊校書揮汗磨鉛胝兩肘當時萬一見此圖諸郎不免涎垂口寄張子公政和聖人拜賢書陛臚春曉傳天衢集英殿下八百衆一時如公此䇿無萬口一詞期第一擢之第三衆不懌諸公貴人願相識戒閽走馬要君入君言不媚有藥石國子先生乃例得我亦跪起就穿執妄意得蒙子公力六年一别安宜北憂患壓人氣不出聞之減米符離日首陽激貪用一律嗚呼四海鳴鋒鏑白晝豺狼恣吞吸帝在奉天頗倉卒絲綸政渇宣公筆緘情逺附雪原鶺願公來扈廵南蹕平泉松菊凌霜碧伐叛亭成燕賔戚起居因書問晨夕宜為蒼生調鼎食方提幹有端石硯池狹不能容水予擕以歸令匠者廣之疑其不返也書來見督以詩解嘲端溪有石紫玉潤未遇良工失追琢眇哉池面劣容指水至不能容一勺灊山道人請歸治要使墨池少開拓毎煩健歩逺來徴事必不然空臆度子如不忘一塊頑予亦敢負千金諾㑹令合浦㸔還珠豈忍荆山長抱璞一毫不敢我非有萬頃難量子宜學聞道年來好説禪初機最忌多貪著認為已有已大謬乆假不歸非爽約均之在此猶在彼弟兄四海何曾各笑傾萬斛付江流所有盡空心境廓請對使者一斧碎與公少解貪癡縛謝人寄硯老矣捐書卧㸔屋尚記姓名供簡牘倉皇去越著南冠頭已如蓬口生醭無因可結孔方交有藥唯醫管城秃新凉稍與燈火親學字頗慚虵蚓曲羅紋重厚使守舍銅雀不真非所蓄敢遣良工開下巖要使珍材過天目君家舊物多錦藉聲若鏘金眼鸜鵒前者一見首重稽回視他山真碌碌公今遣一從我逰謹當配以蟾蜍玉諸公勸楚真叟應進士舉以詩勉之太祖皇帝龍飛初君家樞宻推日車一時事載太史筆九廟畫展功臣圖昭陵取士極妙選乃孫應詔從諸儒威如草木部刺史屢進藥石諫大夫誰知冷落百蠻裏忽見其後清而腴讀書過眼似皎月裁詩出手爭秋蕖諸公力請舉進士駢四儷六子有餘三經新義未改科一代元老出此塗要令我才必有用不憂此口無以餬他年上國與計偕㸔日五色傳天衢謝人恵淺灘一字水圖風行水上初如織任使蕩雲髙沃日屏翳歇去馮夷歸本體湛然無損益風本無形不可畫遇水方能顯其質畫工畫水不畫風水外見風稱妙筆清泉道人乃了此筆下淵源心自得斜斜一字淺可掲渺𣺌横灘晚尤急規模上繼蜀兩孫妙處直度吴諸戚老夫老矣不觀瀾但愛漪漣才咫尺面牆注目風蕭蕭漁浦西興待晚潮縱貧那肯拆波濤還渠并州快剪刀過秀野亭觀趙昌花牡丹酴醿送春歸南風亦復吹戎葵青女不瘦芙蓉肌雪中山茶火爭輝此開彼落相背馳安得坐隅皆見之劔南老人來解衣好手不免如徐熈蕭然四幅十二枝規模一出衆史卑妙處天授非人為右軍字畫少陵詩後來縱好難並馳傳觀左右識者誰愛畫入骨吾一癡惜哉不獲坡谷題何妨擾擾俗眼疑秀野前後花成帷按圖求之君自知簡韓仲朋老范好客老更豪長恨無人陪痛飲我嘗解帯坐南軒閉門投轄則大窘小韓云是故人子酒量直湏吞萬頃昨宵風雨送秋來雨罷月林散清影想當一口吸西江㸔撫朱絲移玉軫誰将五斗為解酲蜾蠃螟蛉供一哂野人無酒可留公一酌山泉薦佳茗謝方務徳恵粟麥投閑閉門且穏坐動輒有礙天難測錢神不肯赴招要􅒻鬼乗時作寒熱要之貧困真我道一一為向兒童説山中宿麥舊為農缾無儲粟今何拙甑塵不掃爨未烟米盡自從仁祖索元英之孫陳義髙急遣樵青分粟麥細舂落落簸珠圓退磨紛紛飛玉屑粥香恍若在僧坊麫􅍄又将思水厄從來藿食不謀國飢即湏餐困仍歇笑殺多牛足糓翁何用詩腸生錦襭耘村麥熟君不見五經紛綸井大春不得已見隂将軍将軍故為設麥飯推去不食言非誠又不見劉懐慰作齊太守亷吏籍中自稱首邦人饋米不肯取示以麥飯吾所有我有郭内一畝田帯經荷耡願有年今年麥熟始一飽乆飢客子俱來前姓名乆與市朝絶将軍薄飯不吾設亦不彊學劉公清但使兒曹知稼穡題孫倅面山軒詩舉頭直北㸔青山低頭直下覷黄巻黄巻辛勤有時厭青山於人保不變山作主人我為客主人㸔客長不倦今代風流潄石公吏事直以儒雅縁一邱一壑在胷中塵土汚人聊舉扇開門抆拭舊題傍坐與烏龍通一線近因秋雨聘此君更倚嵗寒為外援賤子與世多背馳只有青山存半面莫嫌剥啄時扣門要是綈袍故人戀髙風堂一溪之雲各為雨聊與蕭王分出處亂山深處有生涯三尺漁竿一枝艣細讀懐仁輔義書先生於世未嘗疎我已飄然遺物去斯言却以告司徒恭政樹碑頌遺徳舍人作堂詔無極髙風之髙髙幾何下視烏龍六千尺洞霄宫委委曲曲山九鎖巍巍堂堂天一柱靈官跨龍出洞來仙人驅虎載箬去皆山中事泉流兩山鳴珮玦夜壇星辰可手摘世間何限真人祠身未嘗到銜空結一日來遊豈偶然草中更識天荷葉羅教授不赴真叟觀李花之約已而有詩次其韻廣文著書不窺園刻杯以玉露以繁澹乎不躡俗士駕雅意要令吾道尊那知韓賦李有花常以博士居四門老夫却欲來不速但恨人静鐘鳴昬明朝未必遽零落徃㸔花上春風喧更語宗文與宗武詩成入耳宜不煩灊山集巻一考證第一頁後三行苦森終怒俳句按蘓軾咏橄㰖詩有至味森森苦且嚴句翌詩葢本此意惟怒俳二字於文難通或以其質地挺勁故比之端人正士而以俳優為喻然義亦費解今無别本可校姑仍原文第一頁後七行苦硬二字按蘓軾建茶詩有苦硬終可錄句葢出宋時方言姑仍原文第六頁前八行櫑具原本訛作礧具按櫑具乃劔首之飾出漢書雋不疑傳今考正第六頁後二行氷氏子三字文義不可解按栁宗元永州鐵爐歩志稱世有負其姓曰吾門大問其位與徳曰乆矣其先也然而彼猶曰我大世其冒於號有以異於兹歩乎朱翌乃朱載上之子載上與蘓黄遊有名於時据此詩本㫖葢自謙冒其家聲如栁宗元所稱鐵爐歩之意則氷氏當為永氏之訛然無别本可校今姑仍原文
