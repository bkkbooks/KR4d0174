body:
  text: 提要灊山集三巻别集類三宋臣等謹案灊山集三巻宋朱翌撰翌有猗覺寮雜記已著錄其集目見於諸書者宋史藝文志作四十五巻詩三巻陳氏書錄解題作三巻焦氏經籍志作二巻而周必大平園集又云其子軧等類公遺稿凡四十四巻巻目彼此互異葢必大所言即宋志之四十五巻乃其文集陳氏所云三巻者則専指詩集經籍志所載亦其詩集而又訛三巻為二卷也今文集已不可見詩集亦無傳本惟永樂大典所收篇什尚多謹裒而集之釐為三巻以還其原目翌父載上嘗從蘇軾黄庭堅㳺翌承其家學而才力又極富健故所著作頗有元祐遺風集中五七言古體皆極跌宕縱横近體亦偉麗伉健喜以成語屬對率妥帖自然陳鵠耆舊續聞劉克莊後村詩話王應麟困學紀聞皆採其佳句盛相推挹葢其筆力排奡實足睥睨一時與南宋時平易嘽緩之音牽率潦倒之習逈乎不同周必大序以杜牧擬之非溢美也今陳鵠等所摘諸句雖不能悉見全篇然三巻之内菁華具存亦足窺豹一班矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c3dadb3c5ebe85dcc88391b972ef084ddd194a4bf2030521062d1beef3cadb6d
